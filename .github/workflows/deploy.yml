name: Production Deploy

on:
  push:
    branches: [main] # This triggers the deploy every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          # This command triggers the script we just made on the VPS
          script: /home/nachotp/salt_cellar/sc-map/deploy.sh
